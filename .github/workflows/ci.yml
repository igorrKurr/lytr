name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install clang with wasm32 (wasm_golden)
        run: |
          sudo apt-get update
          sudo apt-get install -y clang lld
      - run: cargo test --all-features
      - name: LYTR 0.1 bootstrap (lytr check/run)
        run: |
          cargo run -q --bin lytr -- check examples/minimal.lytr
          test "$(cargo run -q --bin lytr -- run examples/minimal.lytr)" = "7"
      - name: Tier A eval (manifest)
        run: python3 eval/run_tier_a.py
      - name: Tier A Python baselines (numeric tasks)
        run: python3 eval/baseline/python/run_all.py
      - name: Tier A LLM harness (dry-run, no API)
        run: python3 eval/run_llm_eval.py --dry-run
      - name: A/B pilot (LIR + Python LLM harness, dry-run)
        run: python3 eval/run_pilot_ab.py --dry-run
      - name: Pilot regression (fixture vs frozen baseline)
        run: python3 eval/pilot_regression.py --comparison eval/baselines/fixtures/results_pilot_comparison_ci_fixture.json --fail
