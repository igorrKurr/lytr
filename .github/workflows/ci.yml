name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install clang with wasm32 (wasm_golden)
        run: |
          sudo apt-get update
          sudo apt-get install -y clang lld
      - run: cargo test --all-features
      - name: Eval smoke (local lir check)
        run: bash eval/run_local.sh
